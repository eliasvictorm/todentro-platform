server.port=8080

# H2 in-memory (para testes sem instalar PostgreSQL)
spring.datasource.url=jdbc:h2:mem:todentro;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# H2 console: http://localhost:8080/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JWT
jwt.secret=todentro-super-secret-key-change-in-production-2024!!
jwt.expiration=86400000

# ── Para migrar para PostgreSQL: comente as linhas H2 acima e descomente:
# spring.datasource.url=jdbc:postgresql://localhost:5432/todentro
# spring.datasource.username=postgres
# spring.datasource.password=postgres
# spring.datasource.driver-class-name=org.postgresql.Driver
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
